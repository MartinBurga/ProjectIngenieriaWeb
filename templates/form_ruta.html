{% extends "base.html" %}
{% block title %}{{ 'Editar' if edit_mode else 'Registrar' }} Ruta{% endblock %}

{% block content %}
    <h1>{{ 'Editar Ruta' if edit_mode else 'Registro de Ruta' }}</h1>

    <form action="{{ url_for('editar_ruta', id=ruta.id) if edit_mode else url_for('registrar_ruta') }}" method="post" style="max-width: 600px;">
        
        <label>ID:</label><br>
        <input type="text" name="id" value="{{ ruta.id if edit_mode else total_rutas + 1 }}" readonly><br><br>

        <label>Nombre de Ruta:</label><br>
        <input type="text" name="nombre_ruta" value="{{ ruta.nombre if edit_mode else '' }}" required style="width: 100%;"><br><br>

        <div style="display: flex; gap: 10px;">
            <div style="flex:1">
                <label>Origen:</label>
                <input type="text" name="origen" value="{{ ruta.origen if edit_mode else '' }}" required style="width: 100%;">
            </div>
            <div style="flex:1">
                <label>Destino:</label>
                <input type="text" name="destino" value="{{ ruta.destino if edit_mode else '' }}" required style="width: 100%;">
            </div>
        </div><br>

        <div style="display: flex; gap: 10px;">
            <div style="flex:1">
                <label>Distancia (km):</label>
                <input type="number" step="0.1" name="distancia" value="{{ ruta.distancia if edit_mode else '' }}" required style="width: 100%;">
            </div>
            <div style="flex:1">
                <label>Precio Pasaje ($):</label>
                <input type="number" step="0.01" name="precio_pasaje" value="{{ ruta.precio_pasaje if edit_mode else '' }}" required style="width: 100%;">
            </div>
            <div style="flex:1">
                <label>Peajes ($):</label>
                <input type="number" step="0.01" name="peajes" value="{{ ruta.peajes if edit_mode else '0' }}" required style="width: 100%;">
            </div>
        </div><br>

        <button type="submit">{{ 'Actualizar' if edit_mode else 'Guardar' }} Ruta</button>
        <a href="/">Cancelar</a>
    </form>
{% endblock %}
